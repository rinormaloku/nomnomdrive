<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NomBot - The Document Eater</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Head bobbing animation */
    @keyframes chewing-head {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    /* Mouth opening/closing animation */
    @keyframes mouth-chomp {

      0%,
      100% {
        d: path("M160,255 Q200,257 240,255");
      }

      50% {
        d: path("M160,255 Q200,285 240,255");
      }
    }

    /* Paper feeding UP into the mouth */
    @keyframes paper-feed {
      0% {
        transform: translateY(60px);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      80% {
        opacity: 1;
      }

      100% {
        transform: translateY(-20px);
        opacity: 0;
      }
    }

    /* Eye glow pulse */
    @keyframes eye-glow {

      0%,
      100% {
        filter: drop-shadow(0 0 2px #00d2ff);
        opacity: 1;
        transform: scale(1);
      }

      50% {
        filter: drop-shadow(0 0 12px #00d2ff);
        opacity: 0.9;
        transform: scale(1.05);
      }
    }

    .animate-head {
      animation: chewing-head 0.4s ease-in-out infinite;
    }

    .animate-mouth {
      animation: mouth-chomp 0.4s ease-in-out infinite;
    }

    .animate-paper-1 {
      animation: paper-feed 1s linear infinite;
    }

    .animate-paper-2 {
      animation: paper-feed 1s linear infinite;
      animation-delay: 0.5s;
    }

    .eye-glow {
      animation: eye-glow 2s ease-in-out infinite;
      transform-origin: center;
    }
  </style>
</head>

<body class="bg-slate-900 flex flex-col items-center justify-center min-h-screen p-4 overflow-hidden">

  <div class="relative w-full max-w-md aspect-square flex items-center justify-center">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
      <defs>
        <radialGradient id="headGrad" cx="50%" cy="40%" r="60%">
          <stop offset="0%" style="stop-color:#ffffff" />
          <stop offset="100%" style="stop-color:#f8fafc" />
        </radialGradient>
        <linearGradient id="visorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#1e1e1e" />
          <stop offset="100%" style="stop-color:#0a0a0a" />
        </linearGradient>

        <!-- Clip path: Only show paper BELOW the mouth line (approx y=255) -->
        <clipPath id="mouthClip">
          <rect x="0" y="258" width="400" height="200" />
        </clipPath>
      </defs>

      <!-- Shadow -->
      <ellipse cx="200" cy="350" rx="90" ry="12" fill="rgba(0,0,0,0.25)" />

      <!-- NomBot Head (Now much rounder) -->
      <g class="animate-head">
        <!-- Rounder Outer Shell (closer to circular) -->
        <path
          d="M90,190 C90,110 140,80 200,80 C260,80 310,110 310,190 C310,260 270,310 200,310 C130,310 90,260 90,190 Z"
          fill="url(#headGrad)" stroke="#f1f5f9" stroke-width="2" />

        <!-- Visor (Wider and more integrated) -->
        <path
          d="M120,180 C120,135 150,120 200,120 C250,120 280,135 280,180 C280,215 255,235 200,235 C145,235 120,215 120,180 Z"
          fill="url(#visorGrad)" />

        <!-- Eyes -->
        <g class="eye-glow">
          <ellipse cx="165" cy="175" rx="18" ry="10" fill="#00d2ff" transform="rotate(-3, 165, 175)" />
          <ellipse cx="235" cy="175" rx="18" ry="10" fill="#00d2ff" transform="rotate(3, 235, 175)" />
        </g>

        <!-- Mouth Slot Depth -->
        <path d="M160,255 Q200,280 240,255 L240,257 Q200,282 160,257 Z" fill="#2d3748" opacity="0.4"
          class="animate-mouth" />

        <!-- Mouth line -->
        <path d="M160,255 Q200,257 240,255" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"
          class="animate-mouth" />

        <!-- Cute Blush -->
        <ellipse cx="140" cy="210" rx="12" ry="6" fill="#fda4af" opacity="0.3" />
        <ellipse cx="260" cy="210" rx="12" ry="6" fill="#fda4af" opacity="0.3" />
      </g>

      <!-- Document Feed (Foreground Layer) -->
      <g clip-path="url(#mouthClip)">
        <!-- Document 1 -->
        <g class="animate-paper-1">
          <rect x="175" y="255" width="50" height="65" fill="white" rx="2" stroke="#e2e8f0" stroke-width="1" />
          <line x1="182" y1="270" x2="218" y2="270" stroke="#94a3b8" stroke-width="2" />
          <line x1="182" y1="280" x2="210" y2="280" stroke="#94a3b8" stroke-width="2" />
          <line x1="182" y1="290" x2="215" y2="290" stroke="#94a3b8" stroke-width="2" />
        </g>
        <!-- Document 2 -->
        <g class="animate-paper-2">
          <rect x="185" y="255" width="45" height="60" fill="#f8fafc" rx="2" transform="rotate(5, 207, 285)"
            stroke="#e2e8f0" stroke-width="1" />
          <line x1="190" y1="270" x2="220" y2="270" stroke="#94a3b8" stroke-width="2" transform="rotate(5, 207, 285)" />
          <line x1="190" y1="280" x2="215" y2="280" stroke="#94a3b8" stroke-width="2" transform="rotate(5, 207, 285)" />
        </g>
      </g>

    </svg>
  </div>

  <div class="text-center mt-2 space-y-1">
    <h1 class="text-5xl font-black text-white tracking-tighter uppercase italic drop-shadow-lg">NomBot</h1>
    <div class="flex items-center justify-center space-x-2">
      <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
      <p class="text-cyan-400 font-mono text-xs tracking-widest">SYSTEM_FULL_OF_FILES</p>
    </div>
  </div>

</body>

</html>
