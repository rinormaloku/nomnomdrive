services:
  cloud:
    build:
      context: .
      dockerfile: packages/cloud/Dockerfile
    ports:
      - "3030:3030"
    environment:
      DATABASE_URL: postgres://nomnom:nomnom@postgres:5432/nomnomdrive
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_URL: ${SERVER_URL:-http://localhost:3030}
      PORT: 3030
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nomnom
      POSTGRES_PASSWORD: nomnom
      POSTGRES_DB: nomnomdrive
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomnom -d nomnomdrive"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
